schema: ai-content

context: |
  Project: ai-content-plugins
  Goal: Standardize intermediate artifacts via OpenSpec while keeping runtime output compatibility.
  Existing output roots:
    - openspec/runtime/daily-brief/
    - openspec/runtime/brainstorm/
    - openspec/runtime/deep-research/<slug>/
    - openspec/runtime/articles/

rules:
  proposal:
    - "change-id MUST use <verb>-<spec-domain>-<scope>[-YYYYMMDD] in kebab-case."
    - "Allowed verbs: add, update, unify, enforce, remove, refactor."
    - "spec-domain MUST be one of: intake, research, analysis, visuals, assembly, publishing, cross-plugin."
  specs:
    - "Spec path MUST be specs/ai-content-<domain>/spec.md."
    - "Each requirement SHOULD reference related task IDs (T1~T5) in scenario text."
  artifacts:
    - "Preserve runtime filenames: research.md, data-workbook.md, analysis.md, article.md, chart_index.txt."
    - "Pipeline contract file MUST be named pipeline.openspec.json in runtime output folders."
  tasks:
    - "tasks.md MUST include sections: Contract Setup, Task Mapping, Validation & Rollout."
    - "Checklist format MUST be - [ ] X.Y [Tn] Description, where Tn in T0~T5."
